defaults.url=https://sentry.io/

# org and project are intentionally left unset here.
# They are read from EAS secrets at production build time:
#
#   SENTRY_ORG          — your Sentry organization slug
#   SENTRY_PROJECT      — your Sentry project slug
#   SENTRY_AUTH_TOKEN   — token with project:releases + org:read scopes
#
# For preview / development builds, SENTRY_DISABLE_AUTO_UPLOAD=true in eas.json
# skips the sentry-cli upload task entirely so builds succeed without these secrets.
# Runtime error reporting (DSN) still works independently of upload credentials.
