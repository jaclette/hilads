<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Hilads">
  <defs>
    <linearGradient id="g" x1="5%" y1="0%" x2="95%" y2="100%">
      <stop offset="0%"   stop-color="#C24A38"/>
      <stop offset="44%"  stop-color="#B85530"/>
      <stop offset="100%" stop-color="#B87228"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes pulse {
      0%, 100% { opacity: .82; }
      50%       { opacity: 1;   }
    }
    .dot { animation: pulse 3s ease-in-out infinite; }
  </style>

  <!-- Background -->
  <rect width="64" height="64" rx="15" fill="url(#g)"/>

  <!-- H -->
  <rect x="9"  y="13" width="8" height="38" rx="2.5" fill="white"/>
  <rect x="26" y="13" width="8" height="38" rx="2.5" fill="white"/>
  <rect x="17" y="28" width="9" height="6"  rx="2"   fill="white"/>

  <!-- ¡ -->
  <rect x="43" y="25" width="8" height="26" rx="2.5" fill="white"/>
  <circle class="dot" cx="47" cy="15" r="5.5" fill="white"/>
</svg>
