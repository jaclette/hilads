services:
  # PHP REST API
  - type: web
    name: hilads-api
    runtime: docker
    dockerfilePath: ./backend/api/Dockerfile
    dockerContext: ./backend/api
    envVars:
      - key: PORT
        value: 8080

  # Node.js WebSocket presence server
  # Plan is intentionally not set here — control it from the Render dashboard.
  # Starter plan (recommended for production): no sleep, instant connections.
  # Free plan: sleeps after 15min inactivity → ~35s cold start → Cloudflare 521
  # during the wake-up window. Use an external uptime monitor on /health every
  # 5min if staying on the free plan.
  - type: web
    name: hilads-ws
    runtime: node
    rootDir: backend/ws
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
