services:
  # PHP REST API
  # autoDeploy:false — deploys are manual. Push to main freely; hit "Manual Deploy"
  # in the Render dashboard (or the render CLI) when you want the change live.
  - type: web
    name: hilads-api
    runtime: docker
    autoDeploy: false
    dockerfilePath: ./backend/api/Dockerfile
    dockerContext: ./backend/api
    envVars:
      - key: PORT
        value: 8080
      # Phase C feature flag — when "on", GET /channels/{id}/members returns
      # users whose current_city_id matches (single source of truth, set by
      # /location/resolve and /me/city). When "off", uses the legacy sticky
      # union. Default "off" for safe rollout. Flip in the Render dashboard
      # once Phase B has populated current_city_id for ≥70% of active users.
      - key: MEMBERS_USE_CURRENT_CITY
        value: "off"
      # Phase D feature flag — when "on", "new event in your city" push
      # notifications fan out to users with current_city_id = X (regardless
      # of presence/online), filtered by 30-day recency + opt-in pref, with
      # a 1-per-(user,city)-per-10-min rate limit. When "off", the existing
      # presence-based query runs (only notifies users online in the last
      # 3 minutes). Only flip on after MEMBERS_USE_CURRENT_CITY has been on
      # for 24h without issues.
      - key: NOTIFICATIONS_USE_CURRENT_CITY
        value: "off"

  # Node.js WebSocket presence server
  # Plan is intentionally not set here — control it from the Render dashboard.
  # Starter plan (recommended for production): no sleep, instant connections.
  # Free plan: sleeps after 15min inactivity → ~35s cold start → Cloudflare 521
  # during the wake-up window. Use an external uptime monitor on /health every
  # 5min if staying on the free plan.
  - type: web
    name: hilads-ws
    runtime: node
    autoDeploy: false
    rootDir: backend/ws
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
