<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 60" fill="none">

  <!-- Dark background for preview -->
  <rect width="260" height="60" fill="#0a0a0f"/>

  <!-- "h" -->
  <text x="14" y="44"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="36"
    fill="#f8f8fc"
    letter-spacing="-1.5">h</text>

  <!-- "i" — no dot, we'll fake it -->
  <!-- Mask the i-dot with a bg-colored rect, then draw our dot -->
  <text x="38" y="44"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="36"
    fill="#f8f8fc"
    letter-spacing="-1.5">i</text>

  <!-- Kill the native i-dot -->
  <rect x="38" y="4" width="14" height="12" fill="#0a0a0f"/>

  <!-- Live dot — replacing i-dot -->
  <!-- Glow layer -->
  <circle cx="45" cy="10" r="7" fill="#06b6d4" opacity="0.18"/>
  <circle cx="45" cy="10" r="4" fill="#06b6d4" opacity="0.35"/>
  <!-- Core dot -->
  <circle cx="45" cy="10" r="2.8" fill="#06b6d4"/>

  <!-- "lads" -->
  <text x="53" y="44"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="36"
    fill="#f8f8fc"
    letter-spacing="-1.5">lads</text>

</svg>
